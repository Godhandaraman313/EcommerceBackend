<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Order Status Update</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 style="color: #ff9900;">Order Status Update</h2>
        <p>Dear Customer,</p>
        <p>The status of your order <strong>#${orderId}</strong> has been updated to: <strong style="color: #28a745;">${newStatus}</strong>.</p>
        <p><strong>Update Notes:</strong> ${notes}</p>
        <p>Thank you for shopping with Kaimart!</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
        <p style="font-size: 12px; color: #777; text-align: center;">This is an automated message, please do not reply to this email.</p>
    </div>
</body>
</html>
