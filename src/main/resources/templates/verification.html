<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify your email address</title>
    <style>
        body {font-family: 'Inter', 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color:#333; padding:20px; margin:0;}
        .container {max-width:600px; margin:auto; background:#fff; padding:40px; border-radius:16px; box-shadow:0 8px 32px rgba(0,0,0,0.15);}
        .header {text-align:center; margin-bottom:30px;}
        .header h1 {color:#e94560; font-size:28px; margin:0 0 5px 0;}
        .header .brand {color:#0f3460; font-size:14px; letter-spacing:2px; text-transform:uppercase;}
        .content {font-size:16px; margin-bottom:20px; line-height: 1.6;}
        .btn-container {text-align: center; margin: 30px 0;}
        .btn {background-color: #e94560; color: #fff; padding: 12px 30px; text-decoration: none; border-radius: 8px; font-weight: bold; display: inline-block; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); transition: transform 0.2s;}
        .footer {margin-top:30px; text-align:center; color:#888; font-size:13px;}
        .footer strong {color:#0f3460;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Verify your email address</h1>
            <div class="brand">KAIMART</div>
        </div>

        <div class="content">
            <p>Hello,</p>
            <p>Thank you for registering with Kaimart. Please click the button below to verify your email address and activate your account:</p>
            
            <div class="btn-container">
                <a href="http://localhost:5173/verify?code=${token}" class="btn" target="_blank">Verify Email</a>
            </div>
            
            <p>If you didn't register with us, you can safely ignore this email.</p>
        </div>

        <div class="footer">
            <p>Best regards,<br/><strong>The Kaimart Team</strong></p>
        </div>
    </div>
</body>
</html>
